  <g id="foreground">
    <!-- Elegant symmetric capsule body (stadium): rounded top + bottom,
         straight sides — calm and Magic-Mouse-like. -->
    <rect x="356" y="212" width="312" height="600" rx="156" ry="156"
          fill="url(#body)"/>
    <!-- Curved division where the two click buttons meet the body. -->
    <path d="M 382,404 Q 512,428 642,404" fill="none" stroke="#2C6BE6"
          stroke-width="9" stroke-linecap="round"/>
    <!-- Vertical seam splitting the left / right buttons. -->
    <path d="M 512,256 L 512,414" fill="none" stroke="#2C6BE6"
          stroke-width="9" stroke-linecap="round"/>
    <!-- Scroll wheel + a soft sheen stripe. -->
    <rect x="486" y="272" width="52" height="104" rx="26" fill="url(#wheelg)"/>
    <rect x="498" y="288" width="8" height="74" rx="4" fill="#DCE8FF"
